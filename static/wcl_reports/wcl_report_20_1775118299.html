<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大秘境复盘分析报告 - Magister's Terrace +15</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e27;
            --bg-secondary: #151b3d;
            --bg-card: #1a2150;
            --accent-red: #ff4757;
            --accent-orange: #ff6b35;
            --accent-yellow: #ffd93d;
            --accent-green: #6bcb77;
            --accent-blue: #4dabf7;
            --accent-purple: #9775fa;
            --text-primary: #e8eaed;
            --text-secondary: #a0a4b8;
            --border-color: #2d3561;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1629 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(180deg, rgba(255,71,87,0.1) 0%, transparent 100%);
            border-bottom: 2px solid var(--accent-red);
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .kpi-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,71,87,0.2);
        }
        
        .kpi-card.success {
            border-color: var(--accent-green);
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(107,203,119,0.1) 100%);
        }
        
        .kpi-card.danger {
            border-color: var(--accent-red);
            background: linear-gradient(135deg, var(--bg-card) 0%, rgba(255,71,87,0.1) 100%);
        }
        
        .kpi-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        
        .kpi-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        
        .kpi-value.success { color: var(--accent-green); }
        .kpi-value.danger { color: var(--accent-red); }
        .kpi-value.warning { color: var(--accent-orange); }
        .kpi-value.info { color: var(--accent-blue); }
        
        .section {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--accent-red);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--accent-red);
            border-radius: 2px;
        }
        
        .alert-box {
            background: linear-gradient(135deg, rgba(255,107,53,0.15) 0%, rgba(255,71,87,0.15) 100%);
            border: 2px solid var(--accent-orange);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
        }
        
        .alert-box h3 {
            color: var(--accent-orange);
            margin-bottom: 10px;
            font-size: 1.1rem;
        }
        
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        
        .player-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            transition: all 0.3s;
        }
        
        .player-card:hover {
            border-color: var(--accent-blue);
            box-shadow: 0 5px 20px rgba(77,171,247,0.15);
        }

            border-color: var(--accent-red);
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(
