<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大秘境复盘分析 - Magister's Terrace +15</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #131a2e;
            --bg-card: #1a2238;
            --accent-red: #ff4757;
            --accent-orange: #ff6b35;
            --accent-yellow: #ffd93d;
            --accent-green: #26de81;
            --accent-blue: #45aaf2;
            --accent-purple: #a55eea;
            --text-primary: #ffffff;
            --text-secondary: #a0aec0;
            --text-muted: #718096;
            --border-color: #2d3748;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(135deg, rgba(255,71,87,0.1) 0%, rgba(69,170,242,0.1) 100%);
            border-radius: 16px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-orange), var(--accent-yellow), var(--accent-green), var(--accent-blue));
        }
        
        .dungeon-title {
            font-size: 3em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-orange), var(--accent-yellow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .keystone-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.5em;
            font-weight: 700;
            margin: 15px 0;
            box-shadow: 0 4px 20px rgba(165,94,234,0.4);
        }
        
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .kpi-card {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .kpi-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .kpi-value {
            font-size: 2.5em;
            font-weight: 800;
            margin-bottom: 5px;
        }
        
        .kpi-label {
            color: var(--text-secondary);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .kpi-card.success .kpi-value { color: var(--accent-green); }
        .kpi-card.warning .kpi-value { color: var(--accent-yellow); }
        .kpi-card.danger .kpi-value { color: var(--accent-red); }
        .kpi-card.info .kpi-value { color: var(--accent-blue); }
        
        .section {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }
        
        .section-title {
            font-size: 1.8em;
            font-weight: 700;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .section-title .icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 1.2em;
        }
        
        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .player-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }
        
        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
        }
        
        .player-card.warrior::before { background: #C79C6E; }
        .player-card.hunter::before { background: #ABD473; }
        .player-card.deathknight::before { background: #C41F3B; }
        .player-card.monk::before { background: #00FF96; }
        .player-card.druid::before { background: #FF7D0A; }
        
        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .player-name {
font-size: 1.4em;
            font-weight: 700;
        }
        
        .player-role {
            font-size: 0.85em;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        
        .stat-row:last-child {
            border-bottom: none;
        }
        
        .stat-label {
            color: var(--text-secondary);
        }
        
        .stat-value {
            font-weight: 600;
        }
        
        .stat-value.negative {
            color: var(--accent-red);
        }
        
        .stat-value.positive {
            color: var(--accent-green);
        }
        
        .chart-container {
            position: relative;
            height: 300px;
            margin: 20px 0;
        }
        
        .chart-conclusion {
            background: var(--bg-secondary);
            padding: 15px 20px;
            border-radius: 8px;
            margin-top: 15px;
            border-left: 4px solid var(--accent-yellow);
            color: var(--text-secondary);
            font-size: 0.95em;
        }
        
        .failure-item {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-red);
        }
        
        .failure-title {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: var(--accent-red);
        }
        
        .failure-detail {
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .responsibility-list {
            list-style: none;
        }
        
        .responsibility-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 12px;
            transition: transform 0.2s;
        }
        
        .responsibility-item:hover {
            transform: translateX(5px);
        }
        
        .rank-badge {
            width: 50px;
            height: 50px;
display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-weight: 800;
            font-size: 1.2em;
            flex-shrink: 0;
        }
        
        .rank-1 { background: linear-gradient(135deg, #ff4444, #cc0000); }
        .rank-2 { background: linear-gradient(135deg, #ff8800, #cc6600); }
        .rank-3 { background: linear-gradient(135deg, #ffcc00, #cc9900); }
        .rank-4 { background: linear-gradient(135deg, #666, #444); }
        .rank-5 { background: linear-gradient(135deg, #555, #333); }
        
        .responsibility-content {
            flex: 1;
        }
        
        .responsibility-name {
            font-weight: 700;
            font-size: 1.1em;
            margin-bottom: 5px;
        }
        
        .responsibility-reason {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .responsibility-score {
            font-size: 1.5em;
            font-weight: 800;
            color: var(--accent-red);
        }
        
        .fix-item {
            display: flex;
            gap: 15px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 4px solid var(--accent-green);
        }
        
        .fix-number {
            width: 35px;
            height: 35px;
            background: var(--accent-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            flex-shrink: 0;
        }
        
        .fix-content h4 {
            margin-bottom: 8px;
        }
        
        .fix-content p {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        
        .worst-player {
            background: linear-gradient(135deg, rgba(255,0,0,0.2), rgba(139,0,0,0.3));
            border: 2px solid var(--accent-red);
            border-radius: 16px;
            padding: 30px;
            margin: 30px 0;
        }
        
        .worst-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .worst-badge {
            background: linear-gradient(135deg, #ff4444, #8b0000);
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.1em;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.4); }
            50% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); }
        }
        
        .evidence-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .evidence-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 8px;
        }

            color: var(--text-secondary);

</body>
</html>
