<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico">
    <title>{% block title %}魔兽世界每日节奏{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}?v=20260612_1">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; margin: 0; }
        .site-header { background: white; border-bottom: 1px solid #e2e8f0; padding: 10px 0; }
        .site-header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; }
        .site-header a { text-decoration: none; color: #475569; font-size: 14px; }
        .site-header a:hover { color: #1e293b; }
        .site-brand { font-weight: 700; font-size: 16px; color: #1e293b; }
        {% block extra_style %}{% endblock %}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header-inner">
            <a href="/" class="site-brand">魔兽世界每日节奏</a>
            <nav style="display:flex;gap:20px;">
                <a href="/">首页</a>
                <a href="/dashboard/">后台</a>
            </nav>
        </div>
    </header>
    <main style="max-width:1200px;margin:0 auto;padding:20px 16px;">
        {% block content %}{% endblock %}
    </main>
    {% block extra_script %}{% endblock %}
</body>
</html>
