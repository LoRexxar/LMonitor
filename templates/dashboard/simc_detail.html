{% load static %}
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ detail_title }} · SimC</title>
  <style>
    :root{color-scheme:light;--ink:#172033;--muted:#687386;--line:#dfe5ee;--blue:#2563eb;--purple:#6d5bd0;--wash:#f4f5fa;--card:#fff;--success:#16a085}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 88% 0,#e9e4ff 0,transparent 29%),radial-gradient(circle at 8% 14%,#dbeafe 0,transparent 25%),var(--wash);color:var(--ink);font:15px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif}
    a{color:var(--blue);text-decoration:none}a:hover{text-decoration:underline}.shell{width:min(1180px,calc(100% - 32px));margin:0 auto;padding:28px 0 56px}.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}.crumb{color:var(--muted);font-size:13px}
    .hero{position:relative;overflow:hidden;padding:30px;border-radius:24px;color:white;background:linear-gradient(125deg,#17122f 0,#34266d 52%,#2563a8 100%);box-shadow:0 20px 50px #271d5930}.hero:after{content:"";position:absolute;width:260px;height:260px;right:-70px;top:-130px;border-radius:50%;background:#9ae6d533;box-shadow:0 0 80px #60a5fa55}.hero h1{position:relative;z-index:1;margin:7px 0;font-size:clamp(25px,4vw,40px);letter-spacing:-.025em}.hero-meta,.hero-actions{position:relative;z-index:1;display:flex;flex-wrap:wrap;align-items:center;gap:10px}.hero-actions{margin-top:18px}.pill{position:relative;z-index:1;padding:5px 11px;border:1px solid #ffffff14;border-radius:999px;background:#ffffff1f;backdrop-filter:blur(8px)}.pill.warning{background:rgba(245,158,11,.24);color:#fef3c7}.primary-link{display:inline-flex;min-height:44px;align-items:center;gap:7px;padding:9px 14px;border-radius:11px;background:#fff!important;color:#251c54!important;font-weight:700;box-shadow:0 7px 20px #0f172a35}.primary-link:hover{text-decoration:none;transform:translateY(-1px)}.analysis-warning{margin:18px 0 0;border:1px solid #fcd34d;background:#fffbeb;color:#92400e;border-radius:14px;padding:13px 16px;display:flex;flex-wrap:wrap;gap:5px 12px}.analysis-warning span{color:#a16207}
    .grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px;margin-top:18px}.card{grid-column:span 6;background:color-mix(in srgb,var(--card) 96%,#ede9fe);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 9px 28px #22203f0b}.card.wide{grid-column:1/-1}.card h2{display:flex;align-items:center;gap:9px;margin:0 0 16px;font-size:17px}.card h2:before{content:"";width:4px;height:17px;border-radius:4px;background:linear-gradient(var(--purple),#38bdf8)}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.metric{position:relative;overflow:hidden;padding:16px;border:1px solid #e8eaf2;border-radius:14px;background:linear-gradient(145deg,#fff,#f7f7fc)}.metric:first-child{color:white;border-color:transparent;background:linear-gradient(135deg,#493a91,#2563a8)}.metric b{display:block;margin-top:3px;font-size:24px;line-height:1.2;letter-spacing:-.02em}.metric span,.muted{color:var(--muted);font-size:13px}.metric:first-child span{color:#dbeafe}dl{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin:0}dl>div{padding:11px 12px;border-radius:11px;background:#f8fafc}dt{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}dd{margin:3px 0 0;font-weight:650;overflow-wrap:anywhere}.talent-code{display:block;padding:12px;border:1px dashed #c4b5fd;border-radius:10px;background:#f5f3ff;color:#44337a;font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;word-break:break-all}.bonus-list{display:flex;flex-wrap:wrap;gap:7px}.bonus-tag{padding:5px 9px;border-radius:999px;background:#ecfdf5;color:#047857;font-size:12px}
    table{width:100%;border-collapse:collapse}th,td{padding:11px 10px;border-top:1px solid var(--line);text-align:left}thead th{border-top:0;border-bottom:1px solid var(--line);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.055em}.right{text-align:right}.empty{padding:24px;text-align:center;color:var(--muted)}.ability-name{min-width:180px;font-weight:650}.ability-name small{display:block;color:var(--muted);font-size:10px;font-weight:500}.ability-share{min-width:150px}.share-track{height:7px;margin-top:5px;overflow:hidden;border-radius:999px;background:#eceef4}.share-fill{height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--purple),#38bdf8)}.dense-table{min-width:980px;font-size:13px}.dense-table th,.dense-table td{padding:9px 8px;white-space:nowrap}.stack-list{display:flex;max-width:360px;flex-wrap:wrap;gap:4px;margin-top:5px}.stack-list span{padding:2px 6px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:10px;font-weight:500}.status-dot{display:inline-block;width:8px;height:8px;margin-right:6px;border-radius:50%;background:#94a3b8}.status-dot.completed{background:#10b981}.status-dot.running{background:#3b82f6;box-shadow:0 0 0 4px #dbeafe}.status-dot.failed{background:#ef4444}details{margin-top:14px;color:var(--muted)}summary{cursor:pointer}.error{padding:25px;border:1px solid #fecaca;border-radius:16px;background:#fef2f2;color:#991b1b}
    @media (max-width: 720px){.shell{width:min(100% - 20px,1180px);padding-top:14px}.top{align-items:flex-start}.crumb{display:none}.hero{padding:20px;border-radius:18px}.card{grid-column:1/-1;padding:16px}.metrics{grid-template-columns:repeat(2,1fr)}dl{grid-template-columns:1fr}.table-scroll{overflow-x:auto}table{min-width:560px}.ability-share{min-width:140px}}
  </style>
</head>
<body>
<main class="shell">
  <header class="top"><a href="/dashboard/#simc-workbench">← 返回 SimC 工作台</a><span class="crumb">独立详情 · 安全摘要</span></header>
  <div id="simc-detail-root" data-simc-detail-kind="{{ detail_kind }}" data-simc-detail-id="{{ detail_id }}">
    <section class="hero"><span class="pill">正在加载</span><h1>{{ detail_title }}</h1><p>正在从鉴权 JSON API 获取结果摘要…</p></section>
  </div>
</main>
<script src="{% static 'dashboard/js/simc-detail.js' %}?v=20260718-1"></script>
</body>
</html>
