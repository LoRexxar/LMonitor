<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimC 结果分析</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f5f7fb; }
        .panel { border: 1px solid #e9ecef; border-radius: 10px; background: #fff; }
        .panel-header { border-bottom: 1px solid #eef1f4; padding: 10px 12px; font-weight: 600; }
        .panel-body { padding: 12px; }
        .sticky-toolbar { position: sticky; top: 10px; z-index: 10; }
        .table-wrap { max-height: 540px; overflow: auto; }
        .table-wrap thead th { position: sticky; top: 0; z-index: 2; }
        .metric-card { border: 1px solid #e9ecef; border-radius: 10px; background: #fff; padding: 12px; }
        .metric-label { font-size: 12px; color: #6c757d; }
        .metric-value { font-size: 20px; font-weight: 700; color: #212529; }
        .chart-box { height: 320px; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
        .action-summary { display: flex; flex-wrap: wrap; gap: 6px; }
        .action-chip { background: #eef2ff; border: 1px solid #c7d2fe; color: #3730a3; border-radius: 999px; padding: 2px 8px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
                <h4 class="mb-1 text-primary">SimC 结果分析</h4>
                <div class="text-muted small">文件：<span id="result-file-name">-</span></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="window.close()">关闭</button>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <div class="mt-2 text-muted">正在解析结果...</div>
        </div>
        <div id="error" class="alert alert-danger d-none">结果加载失败，请检查文件是否存在或格式是否正确。</div>

        <div id="content" class="d-none">
            <div class="panel mb-3 sticky-toolbar">
                <div class="panel-body py-2">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label mb-1 small">视图模式</label>
                            <select id="view-mode" class="form-select form-select-sm">
                                <option value="all" selected>全部</option>
                                <option value="data">只看数据</option>
                                <option value="chart">只看图表</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label mb-1 small">技能搜索</label>
                            <input id="ability-search" class="form-control form-control-sm" placeholder="技能中/英文">
                        </div>
                        <div class="col-md-2">
                            <label class="form-label mb-1 small">技能占比下限</label>
                            <select id="ability-min-percent" class="form-select form-select-sm">
                                <option value="0">全部</option>
                                <option value="1">>= 1%</option>
                                <option value="3">>= 3%</option>
                                <option value="5">>= 5%</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label mb-1 small">行动搜索</label>
                            <input id="action-search" class="form-control form-control-sm" placeholder="技能/目标/资源">
                        </div>
                        <div class="col-md-3 text-md-end">
                            <button id="btn-reset" class="btn btn-outline-secondary btn-sm">重置</button>
                            <button id="btn-export-abilities" class="btn btn-outline-primary btn-sm">导出技能CSV</button>
                            <button id="btn-export-actions" class="btn btn-outline-success btn-sm">导出行动CSV</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">DPS</div><div id="m-dps" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">主力技能</div><div id="m-top1" class="metric-value fs-6">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">Top3占比</div><div id="m-top3" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">技能总执行</div><div id="m-casts" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">技能显示</div><div id="m-ability-visible" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">行动显示</div><div id="m-action-visible" class="metric-value">-</div></div></div>
            </div>

            <div class="panel mb-3">
                <div class="panel-body py-2 small">
                    <span class="me-3"><strong>角色：</strong><span id="char-name">-</span> / <span id="char-class">-</span> / <span id="char-spec">-</span></span>
                    <span class="me-3"><strong>等级：</strong><span id="char-level">-</span></span>
                    <span class="me-3"><strong>迭代：</strong><span id="iterations">-</span></span>
                    <span class="me-3"><strong>时长：</strong><span id="fight-length">-</span></span>
                    <span class="me-3"><strong>风格：</strong><span id="fight-style">-</span></span>
                </div>
            </div>

            <div id="chart-section" class="row g-3 mb-3">
                <div class="col-lg-6">
                    <div class="panel">
                        <div class="panel-header">技能 DPS 占比（Top8）</div>
                        <div class="panel-body"><canvas id="dps-pie-chart" class="chart-box"></canvas></div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="panel">
                        <div class="panel-header">技能执行次数（Top8）</div>
                        <div class="panel-body"><canvas id="execution-bar-chart" class="chart-box"></canvas></div>
                    </div>
                </div>
            </div>

            <div id="data-section" class="row g-3">
                <div class="col-lg-6">
                    <div class="panel">
                        <div class="panel-header">技能明细</div>
                        <div class="panel-body table-wrap p-0">
                            <table class="table table-sm table-striped mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>技能</th><th>DPS</th><th>DPS%</th><th>执行</th><th>间隔</th><th>平均伤害</th><th>暴击</th>
                                    </tr>
                                </thead>
                                <tbody id="abilities-table"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="panel">
                        <div class="panel-header">行动序列</div>
                        <div class="panel-body">
                            <div class="row g-2 align-items-end mb-2">
                                <div class="col-md-4">
                                    <label class="form-label mb-1 small">序列视图</label>
                                    <select id="action-view-mode" class="form-select form-select-sm">
                                        <option value="merged" selected>合并连续相同技能</option>
                                        <option value="raw">完整原始序列</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label mb-1 small">时间窗口</label>
                                    <select id="action-time-window" class="form-select form-select-sm">
                                        <option value="0" selected>全程</option>
                                        <option value="30">前30秒</option>
                                        <option value="60">前60秒</option>
                                        <option value="120">前120秒</option>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <div class="form-check mt-4">
                                        <input class="form-check-input" type="checkbox" id="action-hide-auto">
                                        <label class="form-check-label small" for="action-hide-auto">隐藏自动攻击</label>
                                    </div>
                                </div>
                            </div>
                            <div id="action-summary" class="action-summary mb-2"></div>
                        </div>
                        <div class="panel-body table-wrap p-0">
                            <table class="table table-sm table-striped mb-0">
                                <thead class="table-dark">
                                    <tr>
                                        <th>时间</th><th>Δt</th><th>#</th><th>技能</th><th>连发</th><th>目标</th><th>资源</th><th>增益</th>
                                    </tr>
                                </thead>
                                <tbody id="action-sequence-table"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DEFAULT_TRANSLATIONS = {
            'Auto Attack': '自动攻击', 'Bloodthirst': '嗜血', 'Raging Blow': '狂怒打击', 'Rampage': '暴怒',
            'Execute': '斩杀', 'Whirlwind': '旋风斩', 'Onslaught': '猛攻', 'Slam': '猛击', 'Avatar': '天神下凡',
            'Recklessness': '鲁莽', 'Charge': '冲锋', 'Heroic Throw': '英勇投掷'
        };
        let skillTranslations = { ...DEFAULT_TRANSLATIONS };
        let abilitiesData = [];
        let actionData = [];
        let shownAbilities = [];
        let shownActions = [];
        let shownActionRows = [];
        let pieChart = null;
        let barChart = null;

        function byId(id) { return document.getElementById(id); }
        function parseNum(v) { const n = parseFloat(String(v ?? '').replace(/,/g, '').replace('%', '').replace('s', '').trim()); return Number.isFinite(n) ? n : 0; }
        function getParam(name) { return new URLSearchParams(window.location.search).get(name) || ''; }
        function tSkill(name) { return skillTranslations[name] || name; }

        function translateText(text) {
            if (!text || typeof text !== 'string') return text;
            let out = text;
            for (const [en, cn] of Object.entries(skillTranslations)) {
                const reg = new RegExp('\\b' + en.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
                out = out.replace(reg, cn);
            }
            return out;
        }

        async function loadTranslations() {
            try {
                const resp = await fetch('/api/keyword-translation/');
                const data = await resp.json();
                if (data && data.success && data.translations) {
                    skillTranslations = { ...skillTranslations, ...data.translations };
                }
            } catch (e) {}
        }

        function parseSimc(html) {
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const result = { character: {}, simulation: {}, abilities: [], actions: [] };
            const player = doc.querySelector('.player');

            if (player) {
                const title = player.querySelector('h2');
                if (title) {
                    const m = title.textContent.match(/(.+?)\s*:\s*([\d,]+)\s*dps/i);
                    if (m) {
                        result.character.name = m[1].trim();
                        result.character.dps = parseNum(m[2]);
                    }
                }
                player.querySelectorAll('.params li').forEach((li) => {
                    const text = li.textContent || '';
                    if (text.includes('Class:')) result.character.class = translateText(text.split(':')[1]?.trim() || '');
                    if (text.includes('Spec:')) result.character.spec = translateText(text.split(':')[1]?.trim() || '');
                    if (text.includes('Level:')) result.character.level = text.split(':')[1]?.trim() || '';
                });

                const abilTable = player.querySelector('table.sc.sort');
                if (abilTable) {
                    abilTable.querySelectorAll('tbody tr.toprow:not(.childrow)').forEach((row) => {
                        const cells = row.querySelectorAll('td');
                        if (cells.length < 8) return;
                        const dpsText = (cells[1].textContent || '').trim();
                        const dpsM = dpsText.match(/\(([\d,]+)\)/);
                        const dps = parseNum(dpsM ? dpsM[1] : dpsText);
                        const pText = (cells[2].textContent || '').trim();
                        const pM = pText.match(/\(([\d.]+%)\)/);
                        result.abilities.push({
                            name: (cells[0].textContent || '').trim(),
                            dps,
                            dpsPercent: pM ? pM[1] : pText,
                            executions: parseNum(cells[3]?.textContent || ''),
                            interval: translateText((cells[4]?.textContent || '').trim()),
                            avgDamage: parseNum(cells[5]?.textContent || ''),
                            critPercent: (cells[12]?.textContent || '').trim()
                        });
                    });
                }
            }

            const mast = doc.querySelector('#masthead');
            if (mast) {
                mast.querySelectorAll('.params li').forEach((li) => {
                    const text = li.textContent || '';
                    if (text.includes('Iterations:')) result.simulation.iterations = text.split(':')[1]?.trim() || '';
                    if (text.includes('Fight Length:')) result.simulation.fightLength = text.split(':')[1]?.trim() || '';
                    if (text.includes('Fight Style:')) result.simulation.fightStyle = text.split(':')[1]?.trim() || '';
                });
            }

            const tables = doc.querySelectorAll('table.sc');
            for (const table of tables) {
                const headers = Array.from(table.querySelectorAll('th')).map((th) => (th.textContent || '').trim().toLowerCase());
                const isSeq = headers.includes('time') && headers.includes('#') && (headers.includes('name') || headers.includes('name [list]'));
                if (!isSeq) continue;
                table.querySelectorAll('tbody tr').forEach((row) => {
                    const c = row.querySelectorAll('td');
                    if (c.length < 6) return;
                    const rawName = c[2]?.querySelector('b') ? c[2].querySelector('b').textContent.trim() : (c[2]?.textContent || '').trim();
                    result.actions.push({
                        time: (c[0]?.textContent || '').trim(),
                        number: (c[1]?.textContent || '').trim(),
                        name: rawName,
                        target: translateText((c[3]?.textContent || '').trim()),
                        resources: translateText((c[4]?.textContent || '').trim()),
                        buffs: translateText((c[5]?.textContent || '').trim())
                    });
                });
                break;
            }
            return result;
        }

        function renderMeta(data) {
            byId('char-name').textContent = data.character.name || '-';
            byId('char-class').textContent = data.character.class || '-';
            byId('char-spec').textContent = data.character.spec || '-';
            byId('char-level').textContent = data.character.level || '-';
            byId('iterations').textContent = data.simulation.iterations || '-';
            byId('fight-length').textContent = data.simulation.fightLength || '-';
            byId('fight-style').textContent = translateText(data.simulation.fightStyle || '-') || '-';
            byId('m-dps').textContent = data.character.dps ? data.character.dps.toLocaleString() : '-';
        }

        function renderAbilities() {
            const key = (byId('ability-search').value || '').trim().toLowerCase();
            const minPercent = parseNum(byId('ability-min-percent').value || '0');
            shownAbilities = abilitiesData.filter((a) => {
                const p = parseNum(a.dpsPercent);
                const s = `${tSkill(a.name)} ${a.name}`.toLowerCase();
                return p >= minPercent && (!key || s.includes(key));
            }).sort((a, b) => parseNum(b.dpsPercent) - parseNum(a.dpsPercent));
            byId('abilities-table').innerHTML = shownAbilities.length ? shownAbilities.map((a) => `
                <tr>
                    <td><div>${tSkill(a.name)}</div><div class="text-muted mono">${a.name}</div></td>
                    <td>${a.dps.toLocaleString()}</td><td>${a.dpsPercent}</td><td>${a.executions.toLocaleString()}</td>
                    <td>${a.interval}</td><td>${a.avgDamage.toLocaleString()}</td><td>${a.critPercent || '-'}</td>
                </tr>
            `).join('') : '<tr><td colspan="7" class="text-center text-muted py-3">无匹配技能</td></tr>';
        }

        function renderActions() {
            const key = (byId('action-search').value || '').trim().toLowerCase();
            const actionViewMode = (byId('action-view-mode')?.value || 'merged').trim();
            const hideAuto = !!byId('action-hide-auto')?.checked;
            const timeWindow = parseNum(byId('action-time-window')?.value || '0');

            shownActions = actionData.filter((a) => {
                const s = `${tSkill(a.name)} ${a.name} ${a.target} ${a.resources} ${a.buffs}`.toLowerCase();
                if (key && !s.includes(key)) return false;
                if (hideAuto && isAutoAttackAction(a)) return false;
                if (timeWindow > 0) {
                    const sec = parseActionSecond(a.time);
                    if (sec > timeWindow) return false;
                }
                return true;
            });

            shownActionRows = buildActionRows(shownActions, actionViewMode === 'merged');
            renderActionSummary(shownActions);
            byId('action-sequence-table').innerHTML = shownActionRows.length ? shownActionRows.map((a) => `
                <tr>
                    <td>${a.timeLabel}</td>
                    <td class="mono">${a.deltaLabel}</td>
                    <td>${a.numberLabel}</td>
                    <td><div>${tSkill(a.name)}</div><div class="text-muted mono">${a.name}</div></td>
                    <td>${a.repeatCount > 1 ? ('x' + a.repeatCount) : '-'}</td>
                    <td>${a.target}</td><td class="mono">${a.resources}</td><td class="mono">${a.buffs}</td>
                </tr>
            `).join('') : '<tr><td colspan="8" class="text-center text-muted py-3">无匹配行动</td></tr>';
        }

        function parseActionSecond(timeText) {
            const m = String(timeText || '').match(/-?\d+(?:\.\d+)?/);
            return m ? parseFloat(m[0]) : Number.MAX_SAFE_INTEGER;
        }

        function isAutoAttackAction(action) {
            const n = String(action?.name || '').toLowerCase();
            return n.includes('auto attack') || n === 'melee' || n.includes('main hand') || n.includes('off hand');
        }

        function buildActionRows(actions, mergeConsecutive) {
            const rows = [];
            let prevSec = null;
            actions.forEach((a) => {
                const sec = parseActionSecond(a.time);
                const deltaLabel = (prevSec !== null && Number.isFinite(sec)) ? `${Math.max(0, sec - prevSec).toFixed(2)}s` : '-';
                prevSec = Number.isFinite(sec) ? sec : prevSec;
                const key = `${a.name}||${a.target || ''}`;
                const last = rows[rows.length - 1];
                if (mergeConsecutive && last && last._mergeKey === key) {
                    last.repeatCount += 1;
                    last.endTime = a.time;
                    last.endNumber = a.number;
                    last.numberLabel = `${last.startNumber}-${last.endNumber}`;
                    last.timeLabel = last.startTime === last.endTime ? last.startTime : `${last.startTime}~${last.endTime}`;
                    last.resources = a.resources;
                    last.buffs = a.buffs;
                    return;
                }
                rows.push({
                    _mergeKey: key,
                    name: a.name,
                    target: a.target,
                    resources: a.resources,
                    buffs: a.buffs,
                    startNumber: a.number,
                    endNumber: a.number,
                    numberLabel: a.number,
                    startTime: a.time,
                    endTime: a.time,
                    timeLabel: a.time,
                    deltaLabel: deltaLabel,
                    repeatCount: 1
                });
            });
            return rows;
        }

        function renderActionSummary(actions) {
            const box = byId('action-summary');
            if (!box) return;
            if (!actions.length) {
                box.innerHTML = '<span class="text-muted small">无可展示行动</span>';
                return;
            }
            const countMap = {};
            actions.forEach((a) => {
                const key = String(a.name || '').trim();
                if (!key) return;
                countMap[key] = (countMap[key] || 0) + 1;
            });
            const top = Object.entries(countMap)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8);
            box.innerHTML = top.map(([name, cnt]) => `<span class="action-chip">${tSkill(name)} × ${cnt}</span>`).join('');
        }

        function renderMetrics() {
            const sorted = [...abilitiesData].sort((a, b) => parseNum(b.dpsPercent) - parseNum(a.dpsPercent));
            if (!sorted.length) {
                byId('m-top1').textContent = '-';
                byId('m-top3').textContent = '-';
                byId('m-casts').textContent = '-';
            } else {
                byId('m-top1').textContent = `${tSkill(sorted[0].name)} (${parseNum(sorted[0].dpsPercent).toFixed(1)}%)`;
                byId('m-top3').textContent = `${sorted.slice(0, 3).reduce((s, x) => s + parseNum(x.dpsPercent), 0).toFixed(1)}%`;
                byId('m-casts').textContent = sorted.reduce((s, x) => s + parseNum(x.executions), 0).toLocaleString();
            }
            byId('m-ability-visible').textContent = `${shownAbilities.length}/${abilitiesData.length}`;
            byId('m-action-visible').textContent = `${shownActionRows.length}/${actionData.length}`;
        }

        function renderCharts() {
            const topByPercent = [...shownAbilities].sort((a, b) => parseNum(b.dpsPercent) - parseNum(a.dpsPercent)).slice(0, 8);
            const topByExec = [...shownAbilities].sort((a, b) => parseNum(b.executions) - parseNum(a.executions)).slice(0, 8);
            if (pieChart) pieChart.destroy();
            if (barChart) barChart.destroy();
            pieChart = new Chart(byId('dps-pie-chart').getContext('2d'), {
                type: 'pie',
                data: { labels: topByPercent.map((x) => tSkill(x.name)), datasets: [{ data: topByPercent.map((x) => parseNum(x.dpsPercent)) }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
            barChart = new Chart(byId('execution-bar-chart').getContext('2d'), {
                type: 'bar',
                data: { labels: topByExec.map((x) => tSkill(x.name)), datasets: [{ data: topByExec.map((x) => parseNum(x.executions)) }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });
        }

        function applyViewMode() {
            const mode = byId('view-mode').value;
            byId('data-section').style.display = (mode === 'chart') ? 'none' : '';
            byId('chart-section').style.display = (mode === 'data') ? 'none' : '';
        }

        function exportCsv(filename, headers, rows) {
            const esc = (v) => {
                const s = String(v ?? '');
                if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
                return s;
            };
            const csv = ['\ufeff' + headers.map(esc).join(',')].concat(rows.map((r) => r.map(esc).join(','))).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);
        }

        function rerender() {
            renderAbilities();
            renderActions();
            renderMetrics();
            renderCharts();
            applyViewMode();
        }

        function bindControls() {
            byId('ability-search').addEventListener('input', rerender);
            byId('ability-min-percent').addEventListener('change', rerender);
            byId('action-search').addEventListener('input', rerender);
            byId('action-view-mode').addEventListener('change', rerender);
            byId('action-time-window').addEventListener('change', rerender);
            byId('action-hide-auto').addEventListener('change', rerender);
            byId('view-mode').addEventListener('change', applyViewMode);
            byId('btn-reset').addEventListener('click', () => {
                byId('ability-search').value = '';
                byId('ability-min-percent').value = '0';
                byId('action-search').value = '';
                byId('action-view-mode').value = 'merged';
                byId('action-time-window').value = '0';
                byId('action-hide-auto').checked = false;
                byId('view-mode').value = 'all';
                rerender();
            });
            byId('btn-export-abilities').addEventListener('click', () => {
                exportCsv('simc_abilities.csv', ['技能(中文)', '技能(英文)', 'DPS', 'DPS%', '执行', '间隔', '平均伤害', '暴击率'], shownAbilities.map((a) => [
                    tSkill(a.name), a.name, a.dps, a.dpsPercent, a.executions, a.interval, a.avgDamage, a.critPercent
                ]));
            });
            byId('btn-export-actions').addEventListener('click', () => {
                exportCsv('simc_actions.csv', ['时间', 'Δt', '序号', '技能(中文)', '技能(英文)', '连发', '目标', '资源', '增益'], shownActionRows.map((a) => [
                    a.timeLabel, a.deltaLabel, a.numberLabel, tSkill(a.name), a.name, a.repeatCount, a.target, a.resources, a.buffs
                ]));
            });
        }

        async function load() {
            const file = getParam('file');
            if (!file) {
                byId('loading').classList.add('d-none');
                byId('error').classList.remove('d-none');
                return;
            }
            byId('result-file-name').textContent = file;
            await loadTranslations();
            try {
                const resp = await fetch(`/api/simc-result-proxy/?file=${encodeURIComponent(file)}`);
                if (!resp.ok) throw new Error('fetch failed');
                const data = await resp.json();
                if (!data || !data.success || !data.content) throw new Error('invalid response');
                const parsed = parseSimc(data.content);
                abilitiesData = parsed.abilities || [];
                actionData = parsed.actions || [];
                renderMeta(parsed);
                rerender();
                byId('loading').classList.add('d-none');
                byId('content').classList.remove('d-none');
            } catch (e) {
                byId('loading').classList.add('d-none');
                byId('error').classList.remove('d-none');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            bindControls();
            load();
        });
    </script>
</body>
</html>
