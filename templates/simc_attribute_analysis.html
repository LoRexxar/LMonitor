<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>属性模拟分析 - LMonitor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #f5f7fb; }
        .panel { border: 1px solid #e9ecef; border-radius: 10px; background: #fff; }
        .panel-header { border-bottom: 1px solid #eef1f4; padding: 10px 12px; font-weight: 600; }
        .panel-body { padding: 12px; }
        .sticky-toolbar { position: sticky; top: 10px; z-index: 10; }
        .table-wrap { max-height: 620px; overflow: auto; }
        .table-wrap thead th { position: sticky; top: 0; z-index: 2; }
        .metric-card { border: 1px solid #e9ecef; border-radius: 10px; background: #fff; padding: 12px; }
        .metric-label { font-size: 12px; color: #6c757d; }
        .metric-value { font-size: 20px; font-weight: 700; color: #212529; }
        .chart-box { height: 340px; }
        .row-highlight { background: #fff8e1 !important; transition: background-color .2s; }
    </style>
</head>
<body>
    <div class="container-fluid py-3">
        <div class="d-flex align-items-center justify-content-between mb-3">
            <div>
                <h4 class="mb-1 text-primary">属性模拟分析</h4>
                <div class="text-muted small">任务ID：<span id="task-id">-</span> / 任务名：<span id="task-name">-</span></div>
            </div>
            <button class="btn btn-secondary btn-sm" onclick="window.close()">关闭</button>
        </div>

        <div id="loading" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <div class="mt-2 text-muted">正在加载属性分析数据...</div>
        </div>
        <div id="error" class="alert alert-danger d-none">加载失败，请检查任务是否存在且包含有效结果。</div>

        <div id="content" class="d-none">
            <div class="panel mb-3 sticky-toolbar">
                <div class="panel-body py-2">
                    <div class="row g-2 align-items-end">
                        <div class="col-md-2">
                            <label class="form-label mb-1 small">视图模式</label>
                            <select id="view-mode" class="form-select form-select-sm">
                                <option value="all" selected>全部</option>
                                <option value="data">只看数据</option>
                                <option value="chart">只看图表</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label mb-1 small">排序方式</label>
                            <select id="sort-by" class="form-select form-select-sm">
                                <option value="dps_desc" selected>DPS 从高到低</option>
                                <option value="dps_asc">DPS 从低到高</option>
                                <option value="attr1_asc">属性1 从小到大</option>
                                <option value="attr2_asc">属性2 从小到大</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label mb-1 small">最低相对性能</label>
                            <select id="min-performance" class="form-select form-select-sm">
                                <option value="0" selected>全部</option>
                                <option value="90">>= 90%</option>
                                <option value="95">>= 95%</option>
                                <option value="98">>= 98%</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label mb-1 small">搜索（属性值/文件名）</label>
                            <input id="keyword" class="form-control form-control-sm" placeholder="如 1200 / crit / xxx.html">
                        </div>
                        <div class="col-md-3 text-md-end">
                            <button id="btn-reset" class="btn btn-outline-secondary btn-sm">重置</button>
                            <button id="btn-export-csv" class="btn btn-outline-primary btn-sm">导出CSV</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-2 mb-3">
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">有效结果</div><div id="m-count" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">最高DPS</div><div id="m-max" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">最低DPS</div><div id="m-min" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">平均DPS</div><div id="m-avg" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">提升幅度</div><div id="m-improve" class="metric-value">-</div></div></div>
                <div class="col-md-2"><div class="metric-card"><div class="metric-label">当前显示</div><div id="m-visible" class="metric-value">-</div></div></div>
            </div>

            <div id="chart-section" class="panel mb-3">
                <div class="panel-header">属性配置与 DPS 趋势（点击点位可打开详情）</div>
                <div class="panel-body">
                    <canvas id="dps-chart" class="chart-box"></canvas>
                </div>
            </div>

            <div id="data-section" class="panel">
                <div class="panel-header">详细数据</div>
                <div class="panel-body table-wrap p-0">
                    <table class="table table-sm table-striped mb-0">
                        <thead class="table-dark">
                            <tr>
                                <th>#</th>
                                <th>属性1</th>
                                <th>属性2</th>
                                <th>DPS</th>
                                <th>相对性能</th>
                                <th>文件</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="data-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allResults = [];
        let shownResults = [];
        let chart = null;
        let maxDps = 0;
        let minDps = 0;

        function byId(id) { return document.getElementById(id); }
        function getTaskId() { return new URLSearchParams(window.location.search).get('task_id') || ''; }
        function num(v) { const n = Number(v); return Number.isFinite(n) ? n : 0; }
        function attrName(name) {
            const map = { gear_crit: '暴击', gear_haste: '急速', gear_mastery: '精通', gear_versatility: '全能', crit: '暴击', haste: '急速', mastery: '精通', versatility: '全能' };
            return map[name] || name || '-';
        }
        function esc(v) { return String(v ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
        function relativePercent(dps) {
            if (maxDps <= minDps) return 100;
            return ((num(dps) - minDps) * 100) / (maxDps - minDps);
        }

        function exportCsv(filename, headers, rows) {
            const wrap = (v) => {
                const s = String(v ?? '');
                if (s.includes(',') || s.includes('"') || s.includes('\n')) return `"${s.replace(/"/g, '""')}"`;
                return s;
            };
            const text = ['\ufeff' + headers.map(wrap).join(',')].concat(rows.map((row) => row.map(wrap).join(','))).join('\n');
            const blob = new Blob([text], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
            URL.revokeObjectURL(url);
        }

        function computeRange() {
            const dps = allResults.map((r) => num(r.dps));
            maxDps = dps.length ? Math.max(...dps) : 0;
            minDps = dps.length ? Math.min(...dps) : 0;
        }

        function renderMetrics() {
            const dps = allResults.map((r) => num(r.dps));
            const avg = dps.length ? dps.reduce((s, x) => s + x, 0) / dps.length : 0;
            const improve = minDps > 0 ? ((maxDps - minDps) / minDps) * 100 : 0;
            byId('m-count').textContent = String(allResults.length);
            byId('m-max').textContent = maxDps.toFixed(0);
            byId('m-min').textContent = minDps.toFixed(0);
            byId('m-avg').textContent = avg.toFixed(0);
            byId('m-improve').textContent = `+${improve.toFixed(1)}%`;
            byId('m-visible').textContent = `${shownResults.length}/${allResults.length}`;
        }

        function getFilteredSortedResults() {
            const keyword = (byId('keyword').value || '').trim().toLowerCase();
            const minPerf = num(byId('min-performance').value || 0);
            const sortBy = byId('sort-by').value;

            let list = allResults.filter((r) => {
                const rel = relativePercent(r.dps);
                if (rel < minPerf) return false;
                if (!keyword) return true;
                const text = `${r.attr1_name} ${r.attr1_value} ${r.attr2_name} ${r.attr2_value} ${r.file_name || ''}`.toLowerCase();
                return text.includes(keyword);
            });

            if (sortBy === 'dps_desc') list.sort((a, b) => num(b.dps) - num(a.dps));
            if (sortBy === 'dps_asc') list.sort((a, b) => num(a.dps) - num(b.dps));
            if (sortBy === 'attr1_asc') list.sort((a, b) => num(a.attr1_value) - num(b.attr1_value));
            if (sortBy === 'attr2_asc') list.sort((a, b) => num(a.attr2_value) - num(b.attr2_value));
            return list;
        }

        function renderTable() {
            shownResults = getFilteredSortedResults();
            const html = shownResults.length ? shownResults.map((r, idx) => {
                const rel = relativePercent(r.dps);
                const viewUrl = `/simc-result/?file=${encodeURIComponent(r.file_name || '')}`;
                return `
                    <tr id="row-${idx}">
                        <td>${idx + 1}</td>
                        <td>${esc(attrName(r.attr1_name))}: <strong>${esc(r.attr1_value)}</strong></td>
                        <td>${esc(attrName(r.attr2_name))}: <strong>${esc(r.attr2_value)}</strong></td>
                        <td>${num(r.dps).toFixed(2)}</td>
                        <td>${rel.toFixed(1)}%</td>
                        <td class="text-muted">${esc(r.file_name || '-')}</td>
                        <td>
                            <a href="${viewUrl}" target="_blank" class="btn btn-sm btn-outline-primary">详情</a>
                            <button class="btn btn-sm btn-outline-secondary" onclick="focusPoint(${idx})">定位</button>
                        </td>
                    </tr>
                `;
            }).join('') : '<tr><td colspan="7" class="text-center text-muted py-3">无匹配数据</td></tr>';
            byId('data-table').innerHTML = html;
            renderMetrics();
        }

        function renderChart() {
            const labels = shownResults.map((_, i) => `配置${i + 1}`);
            const values = shownResults.map((r) => num(r.dps));
            const pointColors = values.map((v) => {
                if (maxDps <= minDps) return 'rgb(59,130,246)';
                const ratio = (v - minDps) / (maxDps - minDps);
                const red = Math.floor(255 * (1 - ratio));
                const green = Math.floor(255 * ratio);
                return `rgb(${red},${green},0)`;
            });
            if (chart) chart.destroy();
            chart = new Chart(byId('dps-chart').getContext('2d'), {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        data: values,
                        borderColor: 'rgb(59,130,246)',
                        backgroundColor: 'rgba(59,130,246,0.15)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.3,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: pointColors,
                        pointRadius: 5,
                        pointHoverRadius: 7
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: (ctx) => {
                                    const i = ctx[0].dataIndex;
                                    const r = shownResults[i];
                                    return `${attrName(r.attr1_name)}:${r.attr1_value} / ${attrName(r.attr2_name)}:${r.attr2_value}`;
                                },
                                label: (ctx) => `DPS: ${num(ctx.parsed.y).toFixed(2)}`
                            }
                        }
                    },
                    onClick: (evt, active) => {
                        if (!active.length) return;
                        const idx = active[0].index;
                        const r = shownResults[idx];
                        if (!r || !r.file_name) return;
                        window.open(`/simc-result/?file=${encodeURIComponent(r.file_name)}`, '_blank');
                    }
                }
            });
        }

        function focusPoint(index) {
            const row = byId(`row-${index}`);
            if (row) {
                row.classList.add('row-highlight');
                row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                setTimeout(() => row.classList.remove('row-highlight'), 1200);
            }
        }
        window.focusPoint = focusPoint;

        function applyViewMode() {
            const mode = byId('view-mode').value;
            byId('chart-section').style.display = mode === 'data' ? 'none' : '';
            byId('data-section').style.display = mode === 'chart' ? 'none' : '';
        }

        function rerender() {
            renderTable();
            renderChart();
            applyViewMode();
        }

        function bindControls() {
            byId('view-mode').addEventListener('change', applyViewMode);
            byId('sort-by').addEventListener('change', rerender);
            byId('min-performance').addEventListener('change', rerender);
            byId('keyword').addEventListener('input', rerender);
            byId('btn-reset').addEventListener('click', () => {
                byId('view-mode').value = 'all';
                byId('sort-by').value = 'dps_desc';
                byId('min-performance').value = '0';
                byId('keyword').value = '';
                rerender();
            });
            byId('btn-export-csv').addEventListener('click', () => {
                const rows = shownResults.map((r) => [
                    attrName(r.attr1_name), r.attr1_value, attrName(r.attr2_name), r.attr2_value,
                    num(r.dps).toFixed(2), `${relativePercent(r.dps).toFixed(1)}%`, r.file_name || ''
                ]);
                exportCsv('simc_attribute_analysis.csv', ['属性1', '属性1值', '属性2', '属性2值', 'DPS', '相对性能', '文件'], rows);
            });
        }

        async function loadData() {
            const taskId = getTaskId();
            byId('task-id').textContent = taskId || '-';
            if (!taskId) {
                byId('loading').classList.add('d-none');
                byId('error').classList.remove('d-none');
                return;
            }
            try {
                const resp = await fetch(`/api/simc-attribute-analysis/?task_id=${encodeURIComponent(taskId)}`);
                if (!resp.ok) throw new Error('network');
                const data = await resp.json();
                if (!data || !data.success || !data.data || !Array.isArray(data.data.results)) throw new Error('invalid');
                byId('task-name').textContent = data.data.task_name || '-';
                allResults = data.data.results.map((r) => ({ ...r, dps: num(r.dps) }));
                computeRange();
                rerender();
                byId('loading').classList.add('d-none');
                byId('content').classList.remove('d-none');
            } catch (e) {
                byId('loading').classList.add('d-none');
                byId('error').classList.remove('d-none');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            bindControls();
            loadData();
        });
    </script>
</body>
</html>
