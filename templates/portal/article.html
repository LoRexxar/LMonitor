<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico">
    <title id="page-title">文章详情 - 魔兽世界每日节奏</title>
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}?v=20260608_2">
    <style>
        .article-content { line-height: 1.8; overflow-x: auto; }
        .article-content p { margin-bottom: 1rem; }
        .article-content h2 { margin: 1.6rem 0 0.75rem; font-size: 1.15rem; font-weight: 700; color: #0f172a; }
        .article-content blockquote { margin: 1rem 0; padding: 0.75rem 1rem; border-left: 3px solid #818cf8; background: #f8fafc; color: #334155; }
        .article-content ul, .article-content ol { margin: 0 0 1rem 1.25rem; padding-left: 0.5rem; }
        .article-content ul { list-style: disc; }
        .article-content ol { list-style: decimal; }
        .article-content li { margin-bottom: 0.4rem; line-height: 1.6; }
        .article-content img { max-width: 100%; border-radius: 0.75rem; margin: 1rem auto; display: block; }
        .article-content .d-image-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 0.75rem; margin: 1.25rem 0; }
        .article-content .d-image-grid img { width: 100%; margin: 0; }
        .article-content .article-image-link { display: block; color: inherit; text-decoration: none; }
        .article-content a { color: #4f46e5; text-decoration: underline; }
        .article-content a:hover { color: #4338ca; }
        .article-content code { background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 0.25rem; font-family: 'Courier New', monospace; font-size: 0.9em; }
        .article-content pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; margin: 1rem 0; }
        .article-content pre code { background: transparent; padding: 0; color: inherit; }
        .article-content table { width: auto; min-width: 100%; border-collapse: collapse; margin: 1rem 0; max-width: none; }
        .article-content thead { background: #f8fafc; }
        .article-content th, .article-content td { border: 1px solid #e2e8f0; padding: 0.6rem 0.8rem; text-align: left; }
        .article-content th { font-weight: 600; color: #0f172a; }
        .article-content td { color: #334155; }
        .article-content br + br { display: block; content: ""; margin-top: 0.5rem; }
        .translation-pair { margin-bottom: 1.5rem; }
        .translated-text { color: #0f172a; font-size: 0.95rem; }
        .original-text { margin-top: 0.35rem; color: #64748b; font-size: 0.8125rem; }
    </style>
</head>
<body class="portal-bg font-sans">
    <header class="portal-header">
        <div class="portal-header-inner">
            <div class="portal-header-left">
                <div class="portal-header-brand">
                    <div class="portal-header-logo">
                        <svg class="portal-logo-fallback-icon w-5 h-5 text-indigo-700" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-globe"></use></svg>
                        <img class="portal-logo-img" src="{% static 'portal/images/portal-logo.webp' %}" alt="" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">
                    </div>
                    <a href="/" class="portal-header-title hover:text-indigo-700">魔兽世界每日节奏 WowDaily.cn</a>
                </div>
            </div>
        </div>
    </header>
    <div class="max-w-[1200px] mx-auto px-4 py-6">
        <div id="article-container" class="portal-card shadow-sm border border-slate-200/70 p-6">
            <div class="text-center text-slate-500">加载中...</div>
        </div>
    </div>

    <script>
        const ARTICLE_ID = {{ article_id|default:"null" }};

        function escapeHtml(s) {
            if (!s) return "";
            return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }

        function sanitizeHref(u) {
            if (!u) return "";
            const s = String(u).trim();
            if (/^https?:\/\//i.test(s)) return s;
            return "";
        }

        function renderBlocks(blocks) {
            if (!Array.isArray(blocks) || !blocks.length) return '';
            if (blocks.length === 1 && blocks[0] && blocks[0].type === 'html') {
                return sanitizeArticleHtml(blocks[0].html || '');
            }
            let html = '';
            let listOpen = false;
            let listType = '';
            const closeList = () => {
                if (listOpen) {
                    html += `</${listType}>`;
                    listOpen = false;
                    listType = '';
                }
            };
            blocks.forEach(block => {
                if (!block || typeof block !== 'object') return;
                const type = block.type || 'paragraph';
                if (type !== 'list_item') closeList();
                if (type === 'heading') {
                    html += `<h2>${escapeHtml(block.text || '')}</h2>`;
                } else if (type === 'quote') {
                    html += `<blockquote>${escapeHtml(block.text || '')}</blockquote>`;
                } else if (type === 'list_item') {
                    const wantedList = block.ordered ? 'ol' : 'ul';
                    if (!listOpen || listType !== wantedList) {
                        closeList();
                        listType = wantedList;
                        html += `<${listType}>`;
                        listOpen = true;
                    }
                    html += `<li>${escapeHtml(block.text || '')}</li>`;
                } else if (block.text) {
                    html += `<p>${escapeHtml(block.text)}</p>`;
                }
            });
            closeList();
            return html;
        }

        function sanitizeArticleHtml(html) {
            const template = document.createElement('template');
            template.innerHTML = String(html || '');
            template.content.querySelectorAll('script, style, iframe, form').forEach(el => el.remove());
            template.content.querySelectorAll('noscript').forEach(el => el.replaceWith(...el.childNodes));
            template.content.querySelectorAll('*').forEach(el => {
                [...el.attributes].forEach(attr => {
                    if (/^on/i.test(attr.name)) el.removeAttribute(attr.name);
                    if ((attr.name === 'href' || attr.name === 'src') && /^javascript:/i.test(attr.value.trim())) {
                        el.removeAttribute(attr.name);
                    }
                });
            });
            return template.innerHTML;
        }

        function renderLegacyTranslation(pairs) {
            if (!Array.isArray(pairs)) return '';
            return pairs.map(pair => `
                <div class="translation-pair">
                    ${pair.translated
                        ? `<div class="translated-text">${escapeHtml(pair.translated)}</div>
                           <div class="original-text">${escapeHtml(pair.original)}</div>`
                        : `<div class="translated-text">${escapeHtml(pair.original)}</div>`
                    }
                </div>
            `).join('');
        }

        async function loadArticle() {
            const container = document.getElementById('article-container');
            if (!ARTICLE_ID) {
                container.innerHTML = '<div class="text-center text-red-500">文章ID无效</div>';
                return;
            }

            try {
                const resp = await fetch(`/portal/api/article/${ARTICLE_ID}/`);
                if (!resp.ok) {
                    container.innerHTML = '<div class="text-center text-red-500">文章不存在</div>';
                    return;
                }
                const data = await resp.json();
                if (data.status !== 'success') {
                    container.innerHTML = '<div class="text-center text-red-500">加载失败</div>';
                    return;
                }

                const article = data.data;
                document.getElementById('page-title').textContent = `${article.title_cn || article.title} - 魔兽世界每日节奏`;

                const sourceNames = {
                    'blizzard_tracker': '暴雪蓝贴',
                    'wowhead': 'Wowhead',
                    'exwind': 'Exwind',
                    'blizzard_cn': '暴雪中国',
                    'nga': 'NGA'
                };
                const sourceName = sourceNames[article.source] || article.source;
                const href = sanitizeHref(article.url);

                let contentHtml = renderBlocks(article.content_blocks_cn) || renderBlocks(article.content_blocks);
                if (!contentHtml && article.content_cn && Array.isArray(article.content_cn)) {
                    contentHtml = renderLegacyTranslation(article.content_cn);
                }
                if (!contentHtml) {
                    contentHtml = '<div class="text-slate-500">暂无内容，请访问原文查看。</div>';
                }

                container.innerHTML = `
                    <div class="mb-6">
                        <h1 class="text-2xl font-bold text-slate-900 mb-2">${escapeHtml(article.title)}</h1>
                        ${article.title_cn ? `<h2 class="text-lg text-indigo-700 mb-3">${escapeHtml(article.title_cn)}</h2>` : ''}
                        <div class="flex flex-wrap items-center gap-3 text-sm text-slate-500">
                            <span class="inline-flex items-center px-2 py-0.5 rounded-md bg-slate-100 text-slate-600">${escapeHtml(sourceName)}</span>
                            ${article.author ? `<span>作者：${escapeHtml(article.author)}</span>` : ''}
                            <span>${escapeHtml(article.publish_time)}</span>
                            ${href ? `<a href="${escapeHtml(href)}" target="_blank" rel="noreferrer" class="text-indigo-600 hover:text-indigo-800">查看原文</a>` : ''}
                        </div>
                    </div>
                    <hr class="border-slate-200 mb-6">
                    <div class="article-content text-sm">
                        ${contentHtml}
                    </div>
                `;
            } catch (e) {
                container.innerHTML = '<div class="text-center text-red-500">加载失败：' + escapeHtml(e.message) + '</div>';
            }
        }

        loadArticle();
    </script>
</body>
</html>
