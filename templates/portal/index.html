<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔兽资讯</title>
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}">
</head>
<body class="portal-bg font-sans">
    <div class="max-w-6xl mx-auto px-4 py-6">
        <div id="toast-root" class="fixed top-4 right-4 z-50 space-y-2"></div>
        <div class="portal-topbar">
            <div class="portal-topbar-inner">
                <div class="flex items-center justify-between gap-3">
                    <div class="text-sm font-semibold tracking-wide text-slate-700">常用入口</div>
                    <div class="text-xs text-slate-500">仅聚合信息与外链</div>
                </div>
                <div class="mt-3 flex flex-wrap gap-2 text-sm">
                    <div id="topbar-tools" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="mt-4 grid grid-cols-1 md:grid-cols-12 gap-3 items-center">
                    <div class="md:col-span-8">
                        <input id="portal-search" class="w-full rounded-xl border border-slate-200 bg-white/80 px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" placeholder="搜索：标题 / 来源 / 作者 ..." autocomplete="off">
                    </div>
                    <div class="md:col-span-4 flex items-center justify-end gap-2">
                        <button id="portal-search-clear" class="px-4 py-2 rounded-xl bg-white border border-slate-200 text-slate-700 text-sm hover:bg-slate-50">清空</button>
                    </div>
                </div>
                <div id="portal-search-meta" class="mt-2 text-xs text-slate-500"></div>
            </div>
        </div>

        <div class="mt-6 grid grid-cols-12 gap-4">
            <div class="col-span-12 lg:col-span-8 space-y-4">
                <div class="portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2">
                            <div class="font-semibold">蓝帖速递</div>
                        </div>
                    </div>
                    <div id="blueposts-list" class="mt-3 text-sm"></div>
                </div>

                <div class="portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2">
                            <div class="font-semibold">EXWIND</div>
                        </div>
                    </div>
                    <div id="exwind-list" class="mt-3 text-sm"></div>
                </div>
            </div>

            <div class="col-span-12 lg:col-span-4">
                <div class="portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
                    <div class="flex items-center justify-between gap-3">
                        <div class="flex items-center gap-2">
                            <div class="font-semibold">NGA 热议</div>
                        </div>
                    </div>
                    <div id="nga-list" class="mt-3 text-sm"></div>
                </div>
            </div>
        </div>

        <div class="mt-6 grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="font-semibold">活动提醒</div>
                    </div>
                </div>
                <div id="events-list" class="mt-3 space-y-2 text-sm"></div>
            </div>
            <div class="portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="font-semibold">视频攻略</div>
                    </div>
                </div>
                <div id="videos-tags" class="mt-3 flex flex-wrap gap-2"></div>
                <div id="videos-list" class="mt-3 space-y-2 text-sm"></div>
            </div>
        </div>

        <div class="mt-6 portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
            <div class="font-semibold">大秘境 Top Runs</div>
            <div id="mplus-controls" class="mt-3 flex flex-wrap items-center gap-2"></div>
            <div id="mplus-rankings" class="mt-3 text-sm"></div>
        </div>

        <div class="mt-6 portal-card bg-white/70 shadow-sm border border-slate-200/70 backdrop-blur p-4">
            <div class="font-semibold">工具导航</div>
            <div id="tools-nav" class="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-sm"></div>
        </div>

        <div class="mt-8 text-xs text-slate-500">
            <div>本站为玩家自建的非官方聚合页，与暴雪娱乐、网易无关。</div>
            <div>内容均来自公开信息并链接至原始来源；每条资讯均标注来源。</div>
        </div>
    </div>

    <script src="{% static 'portal/js/main.js' %}"></script>
</body>
</html>
