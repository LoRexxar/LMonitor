<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.ico">
    <title>魔兽世界每日节奏 WowDaily.cn</title>
    {% load static %}
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'portal/css/portal.css' %}?v=20260617_1">
</head>
<body class="portal-bg font-sans">
    <header class="portal-header">
        <div class="portal-header-inner">
            <div class="portal-header-left">
                <div class="portal-header-brand">
                    <div class="portal-header-logo">
                        <svg class="portal-logo-fallback-icon w-5 h-5 text-indigo-700" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-globe"></use></svg>
                        <img class="portal-logo-img" src="{% static 'portal/images/portal-logo.webp' %}" alt="魔兽世界每日节奏徽章" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">
                    </div>
                    <div class="portal-header-title">魔兽世界每日节奏 WowDaily.cn</div>
                </div>
            </div>
            <div class="portal-header-actions">
                <a href="/dashboard/" class="portal-pill portal-action-btn inline-flex items-center gap-2 text-slate-700 hover:text-slate-900">
                    <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-tools"></use></svg>
                    <span>后台</span>
                </a>
            </div>
        </div>
    </header>
    <div class="max-w-[1200px] mx-auto px-4 py-6">
        <div id="toast-root" class="fixed top-4 right-4 z-50 space-y-2"></div>
        <div class="portal-topbar snap-section">
            <div class="portal-topbar-inner">
                <div class="portal-hero">
                    <div class="portal-hero-brand">
                        <div class="portal-hero-logo">
                            <svg class="portal-logo-fallback-icon w-12 h-12 text-indigo-700/80" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-globe"></use></svg>
                            <img class="portal-hero-logo-img" src="{% static 'portal/images/portal-logo.webp' %}" alt="魔兽世界每日节奏徽章" loading="lazy" onload="this.previousElementSibling.style.display='none'" onerror="this.style.display='none'">
                        </div>
                        <div class="portal-hero-title">魔兽世界每日节奏 WowDaily.cn</div>
                    </div>
                    <div class="portal-hero-search">
                        <input id="portal-search" class="portal-hero-input" placeholder="搜索：标题 / 来源 / 作者 ..." autocomplete="off">
                    </div>
                    <div class="portal-hero-tools">
                        <div id="topbar-tools" class="portal-hero-tools-inner"></div>
                    </div>
                    <div id="portal-search-meta" class="portal-hero-meta"></div>
                </div>
            </div>
        </div>

        <div id="section-news" class="snap-section mt-6 grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div class="portal-card portal-card-accent portal-accent-sky shadow-sm border border-slate-200/70 p-4">
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 font-semibold text-slate-900">
                            <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-megaphone"></use></svg>
                            <span>蓝帖速递</span>
                        </div>
                    </div>
                </div>
                <div id="blueposts-list" class="mt-3 text-sm"></div>
            </div>

            <div class="portal-card portal-card-accent portal-accent-violet shadow-sm border border-slate-200/70 p-4">
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 font-semibold text-slate-900">
                            <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-newspaper"></use></svg>
                            <span>魔兽世界新闻</span>
                        </div>
                    </div>
                </div>
                <div id="exwind-list" class="mt-3 text-sm"></div>
            </div>

            <div class="portal-card portal-card-accent portal-accent-indigo shadow-sm border border-slate-200/70 p-4">
                <div class="flex items-center justify-between gap-3">
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 font-semibold text-slate-900">
                            <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-globe"></use></svg>
                            <span>Wowhead 新闻</span>
                        </div>
                    </div>
                </div>
                <div id="wowhead-list" class="mt-3 text-sm"></div>
            </div>
        </div>

        <div id="section-wow-skill-diff" class="snap-section mt-4 portal-card portal-card-accent portal-accent-indigo shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-2 font-semibold text-slate-900">
                        <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chart"></use></svg>
                        <span>魔兽世界更新数据挖掘</span>
                    </div>
                </div>
            </div>
            <div id="wow-skill-diff-states" class="mt-3 text-sm"></div>
            <div id="wow-skill-diff-list" class="mt-3 text-sm"></div>
        </div>

        <div id="section-nga" class="snap-section mt-4 portal-card portal-card-accent portal-accent-amber shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center justify-between gap-3">
                <div class="flex items-center gap-2">
                    <div class="flex items-center gap-2 font-semibold text-slate-900">
                        <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chat"></use></svg>
                        <span>NGA 热议</span>
                    </div>
                </div>
            </div>
            <div id="nga-list" class="mt-3 text-sm"></div>
        </div>

        <div id="section-events-videos" class="snap-section mt-6 grid grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="portal-card portal-card-accent portal-accent-emerald shadow-sm border border-slate-200/70 p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 font-semibold text-slate-900">
                            <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-calendar"></use></svg>
                            <span>活动提醒</span>
                        </div>
                    </div>
                </div>
                <div id="events-list" class="mt-3 space-y-2 text-sm"></div>
            </div>
            <div class="portal-card portal-card-accent portal-accent-fuchsia shadow-sm border border-slate-200/70 p-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <div class="flex items-center gap-2 font-semibold text-slate-900">
                            <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-video"></use></svg>
                            <span>视频攻略</span>
                        </div>
                    </div>
                </div>
                <div id="videos-tags" class="mt-3 flex flex-wrap gap-2"></div>
                <div id="videos-list" class="mt-3 space-y-2 text-sm"></div>
            </div>
        </div>

        <div id="section-mplus-cutoffs" class="snap-section mt-6 portal-card portal-card-accent portal-accent-indigo shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center gap-2 font-semibold text-slate-900">
                <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chart"></use></svg>
                <span>大秘境分数线（0.1% / 1%）</span>
            </div>
            <div id="mplus-cutoffs" class="mt-3 text-sm"></div>
        </div>

        <div id="section-rank" class="snap-section mt-6 portal-card portal-card-accent portal-accent-indigo shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center gap-2 font-semibold text-slate-900">
                <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chart"></use></svg>
                <span>大秘境 Top Runs</span>
            </div>
            <div id="mplus-controls" class="mt-3 flex flex-wrap items-center gap-2"></div>
            <div id="mplus-rankings" class="mt-3 text-sm"></div>
        </div>

        <div id="section-peak-spec" class="snap-section mt-6 portal-card portal-card-accent portal-accent-indigo shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center gap-2 font-semibold text-slate-900">
                <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chart"></use></svg>
                <span>大秘境巅峰榜</span>
            </div>
            <div id="peak-spec-controls" class="mt-3 flex flex-wrap items-center gap-2"></div>
            <div id="peak-spec-rankings" class="mt-3 text-sm"></div>
        </div>

        <div id="section-mythicstats" class="snap-section mt-6 portal-card portal-card-accent portal-accent-violet shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center gap-2 font-semibold text-slate-900">
                <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chart"></use></svg>
                <span>Mythicstats DPS 榜单</span>
            </div>
            <div id="mythicstats-controls" class="mt-3 flex flex-wrap items-center gap-2"></div>
            <div id="mythicstats-table" class="mt-3 text-sm"></div>
        </div>

        <div id="section-spec-detail" class="snap-section mt-6 portal-card portal-card-accent portal-accent-emerald shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center gap-2 font-semibold text-slate-900">
                <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-chart"></use></svg>
                <span>专精详情</span>
                <span class="text-xs text-slate-400 font-normal ml-2">点击专精图标查看 Top 20 人物榜 / M+ / 团本数据</span>
            </div>
            <div id="spec-detail-grid" class="mt-4"></div>
        </div>

        <div id="section-tools" class="snap-section mt-6 portal-card portal-card-accent portal-accent-rose shadow-sm border border-slate-200/70 p-4">
            <div class="flex items-center gap-2 font-semibold text-slate-900">
                <svg class="w-4 h-4" aria-hidden="true"><use href="{% static 'portal/icons/icons.svg' %}#icon-tools"></use></svg>
                <span>工具导航</span>
            </div>
            <div id="tools-nav" class="mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 text-sm"></div>
        </div>

        <div class="mt-8 text-xs text-slate-500">
            <div>本站为玩家自建的非官方聚合页，与暴雪娱乐、网易无关。</div>
            <div>内容均来自公开信息并链接至原始来源；每条资讯均标注来源。</div>
        </div>
        <div class="mt-3 text-center text-xs text-slate-400">
            <a href="https://beian.miit.gov.cn/" target="_blank" rel="noreferrer" class="hover:text-slate-600">京ICP备2021004652号-3</a>
        </div>
    </div>

    <nav id="snap-dots" class="snap-dots"></nav>
    <script src="{% static 'portal/js/main.js' %}?v=20260617_1"></script>
</body>
</html>
